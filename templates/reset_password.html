<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f0f0; }
        .card { background:#fff; padding:30px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.2); width:350px; text-align:center; }
        input { width:100%; padding:12px; margin:10px 0; border-radius:6px; border:1px solid #ccc; }
        button { padding:12px; width:100%; background:#66c0c0; color:white; border:none; border-radius:6px; cursor:pointer; }
        button:hover { background:#4aa0a0; }
        .flash-message { background:#f8d7da; color:#721c24; padding:10px; margin-bottom:15px; border-radius:6px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reset Password</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-message">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="password" name="password" placeholder="New password" required>
            <input type="password" name="confirm_password" placeholder="Confirm password" required>
            <button type="submit">Reset Password</button>
        </form>

        <p><a href="{{ url_for('login') }}">Back to Login</a></p>
    </div>
</body>
</html>
