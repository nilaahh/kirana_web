<!DOCTYPE html>
<html>
<head>
    <title>Family Weekly Analysis</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            background-image: url("/static/images/various-vegetables-black-table-with-space-message.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-color: lightcyan;
            color: white;
        }

        .content {
            padding: 60px;
            max-width: 1000px;
        }

        h1 {
            font-size: 48px;
            margin-top: 120px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 8px;
        }

        .stat-card small {
            font-size: 12px;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 28px;
            margin-top: 5px;
            font-weight: bold;
        }

        .recommend-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 25px;
            border-radius: 8px;
        }

        .recommend-box ul {
            margin-top: 10px;
            line-height: 1.6;
        }

        .top-nav {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .top-nav a {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            background: #ffffff;
            color: #333;
            border: 2px solid #333;
        }
    </style>
</head>

<body>

    <div class="top-nav">
        <a href="/dashboard">Back</a>
    </div>

    <div class="content">

        <h1>📉 Nutrition Analysis</h1>
        <p>Total nutrient occurrences scaled for <strong>{{ persons }}</strong> members:</p>

        <div class="stats-grid">
            <div class="stat-card">
                <small>PROTEIN SCORE</small>
                <div class="stat-value">{{ stats.protein }}</div>
            </div>

            <div class="stat-card">
                <small>CARB SCORE</small>
                <div class="stat-value">{{ stats.carb }}</div>
            </div>

            <div class="stat-card">
                <small>FAT SCORE</small>
                <div class="stat-value">{{ stats.fat }}</div>
            </div>

            <div class="stat-card">
                <small>FIBER SCORE</small>
                <div class="stat-value">{{ stats.fiber }}</div>
            </div>
        </div>

        <div class="recommend-box">
            <h3>📋 Recommendations</h3>
            <ul>
                {% for rec in recommendations %}
                    <li>{{ rec }}</li>
                {% endfor %}
            </ul>
        </div>

    </div>

</body>
</html>
