<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body, html {
            height: 100%;
        }

        body {
            background: url('{{ url_for("static", filename="images/128.jpg") }}') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signup-card {
            background: rgba(40, 40, 40, 0.85);
            padding: 40px 30px;
            border-radius: 12px;
            width: 360px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .signup-card h2 {
            margin-bottom: 25px;
            color: #f8f8f8;
        }

        .signup-card input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #fdfdfd;
            color: #333;
            font-size: 15px;
        }

        .signup-card input:focus {
            border-color: #66c0c0;
            outline: none;
        }

        .signup-card button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: #66c0c0;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .signup-card button:hover {
            background-color: #4aa0a0;
        }

        .flash-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .login-text {
            margin-top: 20px;
            font-size: 14px;
            color: #ddd;
        }

        .login-text a {
            color: #7fc8ff;
            text-decoration: none;
        }

        .login-text a:hover {
            text-decoration: underline;
        }

        .error-text {
            color: #ff9b9b;
            font-size: 12px;
            text-align: left;
            margin-top: -5px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="signup-card">
    <h2>Create Account</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-message">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST" onsubmit="return validateForm()">

        <input type="text" id="name" name="name" placeholder="UserName" required>
        <div class="error-text" id="nameError"></div>

        <input type="email" id="email" name="email" placeholder="Email" required>
        <div class="error-text" id="emailError"></div>

        <input type="password" id="password" name="password" placeholder="Password" required>
        <div class="error-text" id="passwordError"></div>

        <!-- Confirm Password Added -->
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
        <div class="error-text" id="confirmPasswordError"></div>

        <button type="submit">Signup</button>
    </form>

    <div class="login-text">
        Already have an account? <a href="/login">Login</a>
    </div>
</div>

<script>
function validateForm() {
    let isValid = true;

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirm_password").value.trim();

    document.getElementById("nameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("passwordError").innerText = "";
    document.getElementById("confirmPasswordError").innerText = "";

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const passwordPattern =
        /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

    if (name.length < 3) {
        document.getElementById("nameError").innerText =
            "Name must be at least 3 characters";
        isValid = false;
    }

    if (!emailPattern.test(email)) {
        document.getElementById("emailError").innerText =
            "Enter a valid email address";
        isValid = false;
    }

    if (!passwordPattern.test(password)) {
        document.getElementById("passwordError").innerText =
            "Password must be at least 8 characters and include uppercase, lowercase, number & special character";
        isValid = false;
    }

    if (password !== confirmPassword) {
        document.getElementById("confirmPasswordError").innerText =
            "Passwords do not match";
        isValid = false;
    }

    return isValid;
}
</script>

</body>
</html>
